# Prometheus scrape configuration.
# Only Prometheus self-scrape is configured by default. Add additional jobs
# below as needed and reload Prometheus with:
#   curl -X POST http://localhost:9090/-/reload

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    monitor: "mps-monitoring"

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - "127.0.0.1:9090"
        labels:
          instance: prometheus

  # ---------------------------------------------------------------------
  # Add new scrape targets below this line.
  #
  # Examples:
  #
  # - job_name: node-exporter
  #   static_configs:
  #     - targets: ["node-exporter:9100"]
  #       labels:
  #         instance: host-1
  #
  # - job_name: my-app
  #   static_configs:
  #     - targets: ["my-app:8080"]
  # ---------------------------------------------------------------------