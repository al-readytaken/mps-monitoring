services:
  setup-perms:
    image: alpine:3.23
    container_name: mps-setup-perms
    profiles: ["setup"]
    user: "0:0"
    volumes:
      - ./services/prometheus/data:/target/prometheus
      - ./services/loki/data:/target/loki
      - ./services/grafana/data:/target/grafana
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "Fixing ownership of bind-mounted data directories..."
        chown -R 65534:65534 /target/prometheus
        chown -R 10001:10001 /target/loki
        # Grafana runs as root (user: 0:0) so it can update its bundled
        # plugins dir; no chown needed for grafana data.
        echo "Done. You can now run: docker compose up -d"

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    container_name: prometheus
    restart: unless-stopped
    user: "65534:65534"
    volumes:
      - ./services/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./services/prometheus/data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
      - --web.enable-remote-write-receiver
    ports:
      - "${BIND_IP}:${PROMETHEUS_PORT}:9090"
    networks:
      - monitoring
    depends_on:
      - loki

  loki:
    image: grafana/loki:${LOKI_VERSION}
    container_name: loki
    restart: unless-stopped
    user: "10001:10001"
    volumes:
      - ./services/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - ./services/loki/data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "${BIND_IP}:${LOKI_PORT}:3100"
    networks:
      - monitoring

  alloy:
    image: grafana/alloy:${ALLOY_VERSION}
    container_name: alloy
    restart: unless-stopped
    privileged: true
    volumes:
      - ./services/alloy/alloy.alloy:/etc/alloy/config.alloy:ro
      - ${DOCKER_CONTAINERS_DIR}:/var/lib/docker/containers:ro
      - ${DOCKER_SOCK}:/var/run/docker.sock:ro
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    ports:
      - "${BIND_IP}:${ALLOY_PORT}:12345"
    networks:
      - monitoring
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:${GRAFANA_VERSION}
    container_name: grafana
    restart: unless-stopped
    user: "0:0"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./services/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./services/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./services/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - ./services/grafana/data:/var/lib/grafana
    ports:
      - "${BIND_IP}:${GRAFANA_PORT}:3000"
    networks:
      - monitoring
    depends_on:
      - prometheus
      - loki

networks:
  monitoring:
    driver: bridge
